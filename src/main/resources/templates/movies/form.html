<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.id != null} ? 'Редактировать фильм' : 'Новый фильм'">Фильм</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

        nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem;
              display: flex; align-items: center; gap: 2rem; height: 56px; }
        nav .logo { font-weight: 700; font-size: 1rem; color: #1a1a1a; text-decoration: none; }
        nav a { font-size: .875rem; color: #555; text-decoration: none; }
        nav a:hover { color: #1a1a1a; }
        nav a.active { color: #1a1a1a; font-weight: 600; }

        main { max-width: 560px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .breadcrumb { font-size: .8rem; color: #aaa; margin-bottom: 1.25rem; }
        .breadcrumb a { color: #888; text-decoration: none; }
        .breadcrumb a:hover { color: #1a1a1a; }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.75rem; }

        .form-card { background: #fff; border: 1px solid #e5e5e5;
                     border-radius: 12px; padding: 1.75rem; }

        .field { margin-bottom: 1.25rem; }

        label { display: block; font-size: .75rem; font-weight: 500;
                text-transform: uppercase; letter-spacing: .06em;
                color: #888; margin-bottom: .4rem; }

        input[type="text"], input[type="date"] {
            width: 100%; padding: .6rem .875rem; border: 1px solid #e5e5e5;
            border-radius: 7px; font-size: .9rem; color: #1a1a1a;
            background: #fff; outline: none; transition: border-color .15s; }
        input:focus { border-color: #aaa; }

        .form-footer { display: flex; gap: .75rem; justify-content: flex-end;
                       margin-top: 1.5rem; padding-top: 1.25rem;
                       border-top: 1px solid #f0f0f0; }

        .btn { padding: .55rem 1.25rem; border-radius: 7px; font-size: .875rem;
               font-weight: 500; text-decoration: none; border: 1px solid #e5e5e5;
               background: #fff; color: #1a1a1a; cursor: pointer; }
        .btn:hover { background: #f5f5f5; }
        .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        .btn-primary:hover { background: #333; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">Видеопрокат</a>
    <a href="/">Главная</a>
    <a href="/clients">Клиенты</a>
    <a href="/movies" class="active">Фильмы</a>
    <a href="/issue">Выдача</a>
</nav>

<main>
    <div class="breadcrumb">
        <a href="/movies">Фильмы</a>
        <th:block th:if="${movie.id != null}">
            / <a th:href="@{/movies/{id}(id=${movie.id})}"
                 th:text="${movie.name}"></a>
            / Редактировать
        </th:block>
        <th:block th:if="${movie.id == null}"> / Новый фильм</th:block>
    </div>

    <h1 th:text="${movie.id != null} ? 'Редактировать фильм' : 'Новый фильм'">Фильм</h1>

    <form class="form-card"
          th:action="${movie.id != null}
              ? @{/movies/{id}(id=${movie.id})}
              : @{/movies}"
          th:object="${movie}"
          method="post">

        <div class="field">
            <label for="name">Название</label>
            <input id="name" type="text" th:field="*{name}"
                   placeholder="Матрица">
        </div>

        <div class="field">
            <label for="director">Режиссёр</label>
            <input id="director" type="text" th:field="*{director}"
                   placeholder="Лана Вачовски">
        </div>

        <div class="field">
            <label for="company">Студия</label>
            <input id="company" type="text" th:field="*{company}"
                   placeholder="Warner Bros.">
        </div>

        <div class="field">
            <label for="releaseDate">Дата выхода</label>
            <input id="releaseDate" type="date" th:field="*{releaseDate}">
        </div>

        <div class="form-footer">
            <a class="btn"
               th:href="${movie.id != null}
                   ? @{/movies/{id}(id=${movie.id})}
                   : '/movies'">
                Отмена
            </a>
            <button class="btn btn-primary" type="submit"
                    th:text="${movie.id != null} ? 'Сохранить' : 'Создать'">
            </button>
        </div>
    </form>
</main>

</body>
</html>
