<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.name} + ' — Видеопрокат'">Фильм</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

        nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem;
              display: flex; align-items: center; gap: 2rem; height: 56px; }
        nav .logo { font-weight: 700; font-size: 1rem; color: #1a1a1a; text-decoration: none; }
        nav a { font-size: .875rem; color: #555; text-decoration: none; }
        nav a:hover { color: #1a1a1a; }
        nav a.active { color: #1a1a1a; font-weight: 600; }

        main { max-width: 960px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .breadcrumb { font-size: .8rem; color: #aaa; margin-bottom: 1.25rem; }
        .breadcrumb a { color: #888; text-decoration: none; }
        .breadcrumb a:hover { color: #1a1a1a; }

        .card-header { display: flex; justify-content: space-between;
                       align-items: flex-start; margin-bottom: 1.75rem; }
        .card-header h1 { font-size: 1.5rem; font-weight: 700; }
        .card-header .subtitle { font-size: .875rem; color: #888; margin-top: .25rem; }
        .actions { display: flex; gap: .5rem; }

        .btn { padding: .5rem 1.1rem; border-radius: 7px; font-size: .875rem;
               font-weight: 500; text-decoration: none; border: 1px solid #e5e5e5;
               background: #fff; color: #1a1a1a; cursor: pointer; }
        .btn:hover { background: #f5f5f5; }
        .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        .btn-primary:hover { background: #333; }
        .btn-danger { color: #c0392b; }
        .btn-danger:hover { background: #fff5f5; border-color: #f5c6c6; }

        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr);
                     gap: 1rem; margin-bottom: 2rem; }
        .info-card { background: #fff; border: 1px solid #e5e5e5;
                     border-radius: 10px; padding: 1rem 1.25rem; }
        .info-card .label { font-size: .7rem; text-transform: uppercase;
                            letter-spacing: .06em; color: #aaa; margin-bottom: .35rem; }
        .info-card .value { font-size: .95rem; font-weight: 500; }
        .info-card .value.large { font-size: 1.75rem; font-weight: 700; }

        .section { margin-bottom: 2rem; }
        .section-title { font-size: .7rem; font-weight: 600; text-transform: uppercase;
                         letter-spacing: .06em; color: #aaa; margin-bottom: .75rem; }

        table { width: 100%; border-collapse: collapse; background: #fff;
                border: 1px solid #e5e5e5; border-radius: 10px;
                overflow: hidden; font-size: .875rem; }
        thead th { text-align: left; padding: .7rem 1rem; font-size: .7rem;
                   text-transform: uppercase; letter-spacing: .06em;
                   color: #aaa; border-bottom: 1px solid #e5e5e5; }
        tbody tr { border-bottom: 1px solid #f0f0f0; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #fafafa; }
        tbody td { padding: .7rem 1rem; }

        a.row-link { color: inherit; text-decoration: none; }
        a.row-link:hover { text-decoration: underline; }
        .muted { color: #888; }

        .avail { display: inline-flex; align-items: center; gap: .4rem; font-size: .8rem; }
        .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .dot-green { background: #4caf50; }
        .dot-gray  { background: #ccc; }

        .badge { display: inline-block; padding: .15rem .55rem; border-radius: 99px;
                 font-size: .72rem; font-weight: 500; }
        .badge-issue     { background: #eef6ee; color: #2e7d32; }
        .badge-returning { background: #fef3e2; color: #e65100; }

        .empty-row td { text-align: center; color: #aaa; padding: 1.5rem; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">Видеопрокат</a>
    <a href="/">Главная</a>
    <a href="/clients">Клиенты</a>
    <a href="/movies" class="active">Фильмы</a>
    <a href="/issue">Выдача</a>
</nav>

<main>
    <div class="breadcrumb">
        <a href="/movies">Фильмы</a> / <span th:text="${movie.name}"></span>
    </div>

    <div class="card-header">
        <div>
            <h1 th:text="${movie.name}">Название фильма</h1>
            <div class="subtitle">
                <span th:text="${movie.releaseDate.year}"></span>
                &nbsp;·&nbsp;
                <span th:text="${movie.director}"></span>
                &nbsp;·&nbsp;
                <span th:text="${movie.company}"></span>
            </div>
        </div>
        <div class="actions">
            <a class="btn btn-primary" th:href="@{/issue(movieId=${movie.id})}">Выдать</a>
            <a class="btn" th:href="@{/movies/{id}/edit(id=${movie.id})}">Редактировать</a>
            <form th:action="@{/movies/{id}/delete(id=${movie.id})}" method="post"
                  onsubmit="return confirm('Удалить фильм?')">
                <button class="btn btn-danger" type="submit">Удалить</button>
            </form>
        </div>
    </div>

    <!-- Статистика -->
    <div class="info-grid">
        <div class="info-card">
            <div class="label">Экземпляров</div>
            <div class="value large" th:text="${totalCount}">0</div>
        </div>
        <div class="info-card">
            <div class="label">Доступно</div>
            <div class="value large" th:text="${availableCount}">0</div>
        </div>
        <div class="info-card">
            <div class="label">Выдано</div>
            <div class="value large" th:text="${totalCount - availableCount}">0</div>
        </div>
        <div class="info-card">
            <div class="label">Дата выхода</div>
            <div class="value" th:text="${#temporals.format(movie.releaseDate, 'dd.MM.yyyy')}">—</div>
        </div>
    </div>

    <!-- Экземпляры -->
    <div class="section">
        <div class="section-title">Экземпляры</div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Носитель</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${exemplars}">
                    <td th:text="${e.id}" class="muted"></td>
                    <td th:text="${e.mediaType.name}"></td>
                    <td>
                        <span class="avail" th:if="${e.available}">
                            <span class="dot dot-green"></span> Доступен
                        </span>
                        <span class="avail" th:if="${!e.available}">
                            <span class="dot dot-gray"></span> Выдан
                        </span>
                    </td>
                </tr>
                <tr class="empty-row" th:if="${#lists.isEmpty(exemplars)}">
                    <td colspan="3">Экземпляров нет</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- История транзакций -->
    <div class="section">
        <div class="section-title">История выдач</div>
        <table>
            <thead>
                <tr>
                    <th>Тип</th>
                    <th>Клиент</th>
                    <th>Носитель</th>
                    <th>Дата</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${transactions}">
                    <td>
                        <span class="badge badge-issue"
                              th:if="${t.type.name() == 'issue'}">Выдача</span>
                        <span class="badge badge-returning"
                              th:if="${t.type.name() == 'returning'}">Возврат</span>
                    </td>
                    <td>
                        <a class="row-link"
                           th:href="@{/clients/{id}(id=${t.client.id})}"
                           th:text="${t.client.fullName}">
                        </a>
                    </td>
                    <td th:text="${t.exemplar.mediaType.name}" class="muted"></td>
                    <td th:text="${#temporals.format(t.time, 'dd.MM.yyyy HH:mm')}"
                        class="muted"></td>
                </tr>
                <tr class="empty-row" th:if="${#lists.isEmpty(transactions)}">
                    <td colspan="4">Транзакций нет</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
