<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${client.id != null} ? 'Редактировать клиента' : 'Новый клиент'">Клиент</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

        nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem;
              display: flex; align-items: center; gap: 2rem; height: 56px; }
        nav .logo { font-weight: 700; font-size: 1rem; color: #1a1a1a; text-decoration: none; }
        nav a { font-size: .875rem; color: #555; text-decoration: none; }
        nav a:hover { color: #1a1a1a; }
        nav a.active { color: #1a1a1a; font-weight: 600; }

        main { max-width: 560px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .breadcrumb { font-size: .8rem; color: #aaa; margin-bottom: 1.25rem; }
        .breadcrumb a { color: #888; text-decoration: none; }
        .breadcrumb a:hover { color: #1a1a1a; }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.75rem; }

        .form-card { background: #fff; border: 1px solid #e5e5e5;
                     border-radius: 12px; padding: 1.75rem; }

        .field { margin-bottom: 1.25rem; }

        label { display: block; font-size: .75rem; font-weight: 500;
                text-transform: uppercase; letter-spacing: .06em;
                color: #888; margin-bottom: .4rem; }

        input[type="text"] {
            width: 100%; padding: .6rem .875rem; border: 1px solid #e5e5e5;
            border-radius: 7px; font-size: .9rem; color: #1a1a1a;
            background: #fff; outline: none; transition: border-color .15s; }
        input[type="text"]:focus { border-color: #aaa; }

        /* ── Загрузка фото ── */
        .photo-upload { display: flex; align-items: center; gap: 1rem; }

        .photo-preview {
            width: 64px; height: 64px; border-radius: 50%;
            object-fit: cover; border: 1px solid #e5e5e5;
            flex-shrink: 0;
        }
        .photo-placeholder {
            width: 64px; height: 64px; border-radius: 50%;
            background: #f0f0f0; border: 1px solid #e5e5e5;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #ccc; flex-shrink: 0;
        }

        .file-input-wrapper { flex: 1; }
        .file-input-label {
            display: inline-block; padding: .5rem 1rem;
            border: 1px solid #e5e5e5; border-radius: 7px;
            font-size: .8rem; color: #555; background: #fafafa;
            cursor: pointer; }
        .file-input-label:hover { background: #f0f0f0; }
        input[type="file"] { display: none; }
        .file-name { font-size: .78rem; color: #aaa; margin-top: .35rem; }

        .form-footer { display: flex; gap: .75rem; justify-content: flex-end;
                       margin-top: 1.5rem; padding-top: 1.25rem;
                       border-top: 1px solid #f0f0f0; }

        .btn { padding: .55rem 1.25rem; border-radius: 7px; font-size: .875rem;
               font-weight: 500; text-decoration: none; border: 1px solid #e5e5e5;
               background: #fff; color: #1a1a1a; cursor: pointer; }
        .btn:hover { background: #f5f5f5; }
        .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        .btn-primary:hover { background: #333; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">Видеопрокат</a>
    <a href="/">Главная</a>
    <a href="/clients" class="active">Клиенты</a>
    <a href="/movies">Фильмы</a>
    <a href="/issue">Выдача</a>
</nav>

<main>
    <div class="breadcrumb">
        <a href="/clients">Клиенты</a>
        <th:block th:if="${client.id != null}">
            / <a th:href="@{/clients/{id}(id=${client.id})}"
                 th:text="${client.fullName}"></a>
            / Редактировать
        </th:block>
        <th:block th:if="${client.id == null}"> / Новый клиент</th:block>
    </div>

    <h1 th:text="${client.id != null} ? 'Редактировать клиента' : 'Новый клиент'">Клиент</h1>

    <form class="form-card"
          th:action="${client.id != null}
              ? @{/clients/{id}(id=${client.id})}
              : @{/clients}"
          th:object="${client}"
          method="post"
          enctype="multipart/form-data">

        <div class="field">
            <label for="fullName">Полное имя</label>
            <input id="fullName" type="text" th:field="*{fullName}"
                   placeholder="Иванов Иван Иванович">
        </div>

        <div class="field">
            <label for="phoneNumber">Телефон</label>
            <input id="phoneNumber" type="text" th:field="*{phoneNumber}"
                   placeholder="+7 900 000-00-00">
        </div>

        <div class="field">
            <label for="address">Адрес</label>
            <input id="address" type="text" th:field="*{address}"
                   placeholder="г. Москва, ул. Ленина, д. 1">
        </div>

        <div class="field">
            <label>Фото</label>
            <div class="photo-upload">
                <!-- Превью текущего фото -->
                <img class="photo-preview" id="photoPreview"
                     th:if="${client.imagePath != null and !client.imagePath.isBlank()}"
                     th:src="${client.imagePath}" alt="Фото">
                <div class="photo-placeholder" id="photoPlaceholder"
                     th:if="${client.imagePath == null or client.imagePath.isBlank()}">
                    👤
                </div>

                <div class="file-input-wrapper">
                    <label class="file-input-label" for="image">
                        Выбрать файл
                    </label>
                    <input id="image" type="file" name="image"
                           accept="image/*"
                           onchange="previewPhoto(this)">
                    <div class="file-name" id="fileName">
                        <span th:text="${client.imagePath != null and !client.imagePath.isBlank()}
                            ? 'Текущее фото: ' + ${client.imagePath.substring(client.imagePath.lastIndexOf('/') + 1)}
                            : 'Файл не выбран'"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-footer">
            <a class="btn"
               th:href="${client.id != null}
                   ? @{/clients/{id}(id=${client.id})}
                   : '/clients'">
                Отмена
            </a>
            <button class="btn btn-primary" type="submit"
                    th:text="${client.id != null} ? 'Сохранить' : 'Создать'">
            </button>
        </div>
    </form>
</main>

<script>
    function previewPhoto(input) {
        const preview  = document.getElementById('photoPreview');
        const placeholder = document.getElementById('photoPlaceholder');
        const fileName = document.getElementById('fileName');

        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                // Показываем превью выбранного файла
                if (preview) {
                    preview.src = e.target.result;
                } else {
                    // Превью не было — создаём тег img и скрываем заглушку
                    const img = document.createElement('img');
                    img.className = 'photo-preview';
                    img.id = 'photoPreview';
                    img.src = e.target.result;
                    placeholder.replaceWith(img);
                }
                if (placeholder) placeholder.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
            fileName.textContent = input.files[0].name;
        }
    }
</script>

</body>
</html>
