<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеопрокат</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* ── Навигация ── */
        nav {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 56px;
        }
        nav .logo {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: .02em;
            color: #1a1a1a;
            text-decoration: none;
        }
        nav a {
            font-size: .875rem;
            color: #555;
            text-decoration: none;
        }
        nav a:hover { color: #1a1a1a; }
        nav a.active { color: #1a1a1a; font-weight: 600; }

        /* ── Контент ── */
        main {
            max-width: 960px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.75rem;
        }

        /* ── Карточки статистики ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
        }
        .stat-card .label {
            font-size: .75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: .5rem;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }
        .stat-card .link {
            display: inline-block;
            margin-top: .6rem;
            font-size: .75rem;
            color: #888;
            text-decoration: none;
        }
        .stat-card .link:hover { color: #1a1a1a; }

        /* ── Последние выдачи ── */
        .section-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .section-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }
        .section-header a {
            font-size: .8rem;
            color: #888;
            text-decoration: none;
        }
        .section-header a:hover { color: #1a1a1a; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            overflow: hidden;
            font-size: .875rem;
        }
        thead th {
            text-align: left;
            padding: .75rem 1rem;
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #888;
            border-bottom: 1px solid #e5e5e5;
        }
        tbody tr { border-bottom: 1px solid #f0f0f0; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #fafafa; }
        tbody td { padding: .75rem 1rem; color: #333; }

        .empty {
            padding: 2rem;
            text-align: center;
            color: #aaa;
            font-size: .875rem;
        }

        /* ── Быстрые действия ── */
        .actions {
            display: flex;
            gap: .75rem;
            margin-top: 2rem;
        }
        .btn {
            padding: .55rem 1.25rem;
            border-radius: 7px;
            font-size: .875rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #e5e5e5;
            background: #fff;
            color: #1a1a1a;
            cursor: pointer;
        }
        .btn:hover { background: #f5f5f5; }
        .btn-primary {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }
        .btn-primary:hover { background: #333; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">Видеопрокат</a>
    <a href="/" class="active">Главная</a>
    <a href="/clients">Клиенты</a>
    <a href="/movies">Фильмы</a>
    <a href="/issue">Выдача</a>
</nav>

<main>
    <h1>Дашборд</h1>

    <!-- Статистика -->
    <div class="stats">
        <div class="stat-card">
            <div class="label">Клиенты</div>
            <div class="value" th:text="${clientCount}">0</div>
            <a class="link" href="/clients">Все клиенты →</a>
        </div>
        <div class="stat-card">
            <div class="label">Фильмы</div>
            <div class="value" th:text="${movieCount}">0</div>
            <a class="link" href="/movies">Все фильмы →</a>
        </div>
        <div class="stat-card">
            <div class="label">Экземпляры</div>
            <div class="value" th:text="${exemplarCount}">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Доступно</div>
            <div class="value" th:text="${availableCount}">0</div>
            <a class="link" href="/issue">Выдать →</a>
        </div>
    </div>

    <!-- Последние выдачи -->
    <div class="section-header">
        <h2>Последние выдачи</h2>
    </div>

    <table th:if="${not #lists.isEmpty(recentTransactions)}">
        <thead>
            <tr>
                <th>Клиент</th>
                <th>Фильм</th>
                <th>Носитель</th>
                <th>Дата</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${recentTransactions}">
                <td>
                    <a th:href="@{/clients/{id}(id=${t.client.id})}"
                       th:text="${t.client.fullName}"
                       style="color:inherit; text-decoration:none;">
                    </a>
                </td>
                <td>
                    <a th:href="@{/movies/{id}(id=${t.exemplar.movie.id})}"
                       th:text="${t.exemplar.movie.name}"
                       style="color:inherit; text-decoration:none;">
                    </a>
                </td>
                <td th:text="${t.exemplar.mediaType.name}"></td>
                <td th:text="${#temporals.format(t.time, 'dd.MM.yyyy HH:mm')}"></td>
            </tr>
        </tbody>
    </table>

    <div class="empty" th:if="${#lists.isEmpty(recentTransactions)}">
        Выдач пока нет
    </div>

    <!-- Быстрые действия -->
    <div class="actions">
        <a class="btn btn-primary" href="/issue">Выдать экземпляр</a>
        <a class="btn" href="/clients/new">Новый клиент</a>
        <a class="btn" href="/movies/new">Новый фильм</a>
    </div>
</main>

</body>
</html>
